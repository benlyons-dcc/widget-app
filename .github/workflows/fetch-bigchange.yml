name: Fetch BigChange Data

on:
  schedule:
    # Runs every 5 minutes (GitHub's minimum interval)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Force Node.js 24 for actions
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Fetch BigChange data
        env:
          BIGCHANGE_CLIENT_ID: ${{ secrets.BIGCHANGE_CLIENT_ID }}
          BIGCHANGE_CLIENT_SECRET: ${{ secrets.BIGCHANGE_CLIENT_SECRET }}
          BIGCHANGE_CUSTOMER_ID: ${{ secrets.BIGCHANGE_CUSTOMER_ID }}
        run: node scripts/fetch-bigchange.js

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if data.json actually changed
          git diff --cached --quiet || git commit -m "chore: update BigChange data [skip ci]"
          git push
