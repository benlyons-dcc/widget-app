name: Fetch BigChange Data

on:
  schedule:
    # Runs every 5 minutes (GitHub's minimum interval)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    # No contents: write needed — data goes to Netlify Blobs, not the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Force Node.js 24 for actions
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Fetch BigChange data and store in Netlify Blobs
        env:
          BIGCHANGE_CLIENT_ID: ${{ secrets.BIGCHANGE_CLIENT_ID }}
          BIGCHANGE_CLIENT_SECRET: ${{ secrets.BIGCHANGE_CLIENT_SECRET }}
          BIGCHANGE_CUSTOMER_ID: ${{ secrets.BIGCHANGE_CUSTOMER_ID }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_ACCESS_TOKEN: ${{ secrets.NETLIFY_ACCESS_TOKEN }}
        run: node scripts/fetch-bigchange.js
